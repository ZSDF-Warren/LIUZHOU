<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>柳州旅行 · 景点地图</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- 数据模块 -->
    <script src="data/attractions.js"></script>
    <script src="data/itinerary.js"></script>
    <script src="data/config.js"></script>
    <link rel="stylesheet" href="styles/main.css" />
</head>
<body>

<div id="map"></div>

<!-- 顶部信息栏 -->
<div class="top-bar">
    <div class="top-bar-inner">
        <div class="top-title">柳州 · 景点地图</div>
        <div class="top-subtitle">清明出行 4/4-4/6 | 广州南 07:25 → 柳州 11:25</div>
        <div class="top-chips" id="filterChips"></div>
    </div>
</div>

<!-- 左侧行程按钮 -->
<div class="left-btns">
    <button class="left-btn" id="btnRoute">
        <div class="left-btn-icon">🗺️</div>
        <span class="left-btn-label">行程路线</span>
    </button>
</div>

<!-- 右侧功能按钮 -->
<div class="side-btns" id="sideButtons"></div>

<!-- 底部景点浮动列表 -->
<div class="bottom-panel" id="bottomPanel">
    <div class="panel-handle" id="panelHandle">
        <div class="panel-handle-bar"></div>
    </div>
    <div class="attractions-scroll" id="attractionsScroll"></div>
</div>

<!-- 景点详情抽屉 -->
<div class="detail-overlay" id="detailOverlay"></div>
<div class="detail-drawer" id="detailDrawer">
    <div class="detail-handle" id="detailHandle"><div class="detail-handle-bar"></div></div>
    <div class="detail-body" id="detailBody"></div>
</div>

<!-- 信息面板抽屉 -->
<div class="info-overlay" id="infoOverlay"></div>
<div class="info-drawer" id="infoDrawer">
    <div class="info-handle" id="infoHandle"><div class="info-handle-bar"></div></div>
    <div class="info-body" id="infoBody"></div>
</div>

<!-- 行程路线面板（左侧滑出） -->
<div class="route-overlay" id="routeOverlay"></div>
<div class="route-panel" id="routePanel">
    <div class="route-header">
        <div class="route-title">📋 行程路线</div>
        <div class="route-subtitle">4月4日 ~ 4月6日 · 以吃为主</div>
        <button class="route-close" id="routeClose">✕</button>
    </div>
    <div class="route-tabs" id="routeTabs"></div>
    <div class="route-body" id="routeBody"></div>
</div>

<script src="js/map-core.js"></script>
<script src="js/panels.js"></script>
<script src="js/route.js"></script>
<script src="js/app.js"></script>
</body>
</html>
